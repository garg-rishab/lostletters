<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Letters | Rishabh</title>
    <style>
        body {
            background-color: #f4f4f4; /* Soft grey, easy on the eyes */
            font-family: 'Georgia', serif; /* Classic poetic font */
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        h1 { font-weight: normal; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .poem { white-space: pre-line; line-height: 1.8; font-style: italic; margin-top: 30px; }
        footer { margin-top: 50px; font-size: 0.8em; color: #999; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Used to Love You</h1>
        <div class="poem">
            The Poems, The Letters;
            The Love, The Care;
            Ready to throw them all,
            But all were in vain.
            
            They used to tell me,
            that you don't deserve me;
            That was my fault,
            I used to Love you!
        </div>
        <footer>© Rishabh | lostletters</footer>
    </div>
</body>
</html>
